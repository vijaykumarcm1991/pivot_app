{% extends "base.html" %}
{% block title %}Delete Audit — Pivot App{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="fw-bold mb-0">
    <i class="bi bi-shield-check me-2 text-primary"></i>Delete Audit
  </h2>
  <button type="button" class="btn btn-sm btn-outline-primary" id="refreshBtn">
    <i class="bi bi-arrow-clockwise me-1"></i>Refresh
  </button>
</div>

<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <form id="auditForm" class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label small fw-bold mb-1">Search</label>
        <input id="auditQuery" type="text" class="form-control form-control-sm"
               placeholder="dataset name, selection criteria, …">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-bold mb-1">Status</label>
        <select id="auditStatus" class="form-select form-select-sm">
          <option value="">All</option>
          <option value="success">Success</option>
          <option value="failed">Failed</option>
          <option value="in_progress">In Progress</option>
        </select>
      </div>
      <div class="col-md-2 d-grid">
        <button type="submit" class="btn btn-sm btn-primary">
          <i class="bi bi-funnel me-1"></i>Apply
        </button>
      </div>
      <div class="col-md-2 d-grid">
        <button type="button" class="btn btn-sm btn-outline-secondary" id="clearBtn">Clear</button>
      </div>
    </form>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="table-responsive" style="max-height:70vh;">
    <table class="table table-sm table-hover align-middle mb-0">
      <thead>
        <tr>
          <th style="width:160px;">When</th>
          <th>Dataset / Sheet</th>
          <th class="text-end" style="width:120px;">Pivot Rows</th>
          <th class="text-end" style="width:120px;">Matched</th>
          <th class="text-end" style="width:120px;">Deleted</th>
          <th style="width:120px;">Status</th>
          <th style="width:90px;"></th>
        </tr>
      </thead>
      <tbody id="auditRows">
        <tr><td colspan="7" class="text-center text-muted py-3">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Detail modal -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body"><pre id="detailPre" class="small mb-0"></pre></div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/audit.js"></script>
{% endblock %}
