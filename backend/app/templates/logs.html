{% extends "base.html" %}
{% block title %}Log Viewer — Pivot App{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="fw-bold mb-0">
    <i class="bi bi-journal-text me-2 text-primary"></i>Log Viewer
  </h2>
  <div class="d-flex align-items-center gap-2">
    <a href="/api/logs/download" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-download me-1"></i>Download Log File
    </a>
  </div>
</div>

<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <form id="logFilterForm" class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="form-label small fw-bold mb-1">Search</label>
        <input id="logQuery" type="text" class="form-control form-control-sm"
               placeholder="message or details contains…">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold mb-1">Level</label>
        <select id="logLevel" class="form-select form-select-sm">
          <option value="">All</option>
          {% for l in levels %}
            <option value="{{ l }}">{{ l }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold mb-1">Category</label>
        <select id="logCategory" class="form-select form-select-sm">
          <option value="">All</option>
          {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold mb-1">From</label>
        <input id="logDateFrom" type="date" class="form-control form-control-sm">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold mb-1">To</label>
        <input id="logDateTo" type="date" class="form-control form-control-sm">
      </div>
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-sm btn-primary" id="applyBtn">
          <i class="bi bi-funnel me-1"></i>Apply
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="clearBtn">
          <i class="bi bi-x-lg me-1"></i>Clear
        </button>
        <span class="ms-auto small text-muted" id="resultCount"></span>
      </div>
    </form>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="table-responsive" style="max-height:70vh;">
    <table class="table table-sm table-hover align-middle mb-0">
      <thead>
        <tr>
          <th style="width:160px;">Timestamp</th>
          <th style="width:90px;">Level</th>
          <th style="width:120px;">Category</th>
          <th>Message</th>
          <th style="width:220px;">Source</th>
        </tr>
      </thead>
      <tbody id="logRows">
        <tr><td colspan="5" class="text-center text-muted py-4">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/logs.js"></script>
{% endblock %}
