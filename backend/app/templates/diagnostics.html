{% extends "base.html" %}
{% block title %}Diagnostics — Pivot App{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold mb-0">
    <i class="bi bi-activity me-2 text-primary"></i>System Diagnostics
  </h2>
  <div class="d-flex align-items-center gap-2">
    <button type="button" class="btn btn-sm btn-outline-primary" id="refreshBtn">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh
    </button>
    <a href="/api/diagnostics" target="_blank" rel="noopener" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-filetype-json me-1"></i>JSON
    </a>
  </div>
</div>

<div class="row g-3" id="diagCards">
  <div class="col-12 text-muted">
    <span class="spinner-border spinner-border-sm me-2"></span>Loading diagnostics…
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/diagnostics.js"></script>
{% endblock %}
