{% extends "base.html" %}
{% block title %}{{ status_code }} — {{ heading }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:60vh;">
  <div class="text-center" style="max-width:560px;">
    <div class="display-1 text-muted fw-bold mb-2">{{ status_code }}</div>
    <h1 class="h3 fw-bold mb-3">
      <i class="bi {{ icon|default('bi-exclamation-triangle') }} text-warning me-2"></i>{{ heading }}
    </h1>
    <p class="text-muted">{{ message }}</p>
    <div class="d-flex flex-wrap gap-2 justify-content-center mt-4">
      <a href="/" class="btn btn-primary">
        <i class="bi bi-house-door me-1"></i>Return Home
      </a>
      <button type="button" class="btn btn-outline-secondary" onclick="history.length > 1 ? history.back() : (window.location='/');">
        <i class="bi bi-arrow-left me-1"></i>Return Previous Page
      </button>
    </div>
    <p class="small text-muted mt-4 mb-0">
      <i class="bi bi-tag me-1"></i>{{ app_name }}
    </p>
  </div>
</div>
{% endblock %}
