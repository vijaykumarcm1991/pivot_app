# Note: the obsolete top-level "version" key was removed.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pivot_backend
    restart: unless-stopped
    environment:
      - UPLOAD_DIR=/app/uploads
      - REPORTS_DIR=/app/generated_reports
      - DB_PATH=/app/data/pivot.db
      - USERS_JSON_PATH=/app/users.json
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/generated_reports
      - db_data:/app/data
      # The user drops a fresh users.json on the host whenever
      # the company directory changes. The container reads it
      # read-only and the email composer's typeahead picks it up
      # on the next request (mtime-based auto-reload). Drop the
      # file at ./users.json (project root) and the existing mount
      # picks it up — no rebuild required.
      - ./users.json:/app/users.json:ro
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: pivot_nginx
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  uploads_data:
  reports_data:
  db_data:
