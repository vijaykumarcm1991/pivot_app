# Note: the obsolete top-level "version" key was removed.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pivot_backend
    restart: unless-stopped
    environment:
      - UPLOAD_DIR=/app/uploads
      - REPORTS_DIR=/app/generated_reports
      - DB_PATH=/app/data/pivot.db
      - USERS_CSV_PATH=/app/Users.csv
      - DISTRIBUTION_LISTS_CSV_PATH=/app/DistributionLists.csv
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/generated_reports
      - db_data:/app/data
      # The user drops fresh directory CSVs on the host whenever
      # the company directory changes. The container reads them
      # read-only and the email composer's typeahead picks them up
      # on the next request (mtime-based auto-reload). Drop the
      # files at ./Users.csv + ./DistributionLists.csv (project
      # root) and the existing mounts pick them up — no rebuild
      # required.
      - ./Users.csv:/app/Users.csv:ro
      - ./DistributionLists.csv:/app/DistributionLists.csv:ro
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: pivot_nginx
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  uploads_data:
  reports_data:
  db_data:
